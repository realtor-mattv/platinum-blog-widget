<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blog Comments</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:       #C9A84C;
      --gold-light: #E8D5A3;
      --navy:       #1A2A3A;
      --navy-mid:   #243448;
      --slate:      #4A5568;
      --mist:       #F7F8FA;
      --white:      #FFFFFF;
      --border:     #E2E8F0;
      --success:    #2D7A4F;
      --error:      #B91C1C;
      --radius:     10px;
      --shadow:     0 2px 12px rgba(26,42,58,0.08);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: transparent;
      color: var(--navy);
    }

    .comments-wrapper {
      max-width: 780px;
      margin: 0 auto;
      padding: 0 16px 48px;
    }

    /* ── Section header ── */
    .section-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
      padding-bottom: 18px;
      border-bottom: 2px solid var(--gold);
    }
    .section-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.75rem;
      font-weight: 600;
      color: var(--navy);
      letter-spacing: -0.01em;
    }
    .comment-count-badge {
      background: var(--gold);
      color: var(--white);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.04em;
    }

    /* ── Comment cards ── */
    .comments-list { display: flex; flex-direction: column; gap: 20px; margin-bottom: 40px; }

    .comment-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px 24px;
      box-shadow: var(--shadow);
      transition: border-color 0.2s;
    }
    .comment-card:hover { border-color: var(--gold-light); }

    .comment-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    .avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--navy);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--gold);
      flex-shrink: 0;
    }
    .commenter-name {
      font-weight: 600;
      font-size: 0.9rem;
      color: var(--navy);
    }
    .comment-date {
      font-size: 0.75rem;
      color: var(--slate);
      margin-top: 2px;
    }
    .comment-body {
      font-size: 0.93rem;
      line-height: 1.7;
      color: var(--slate);
    }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 40px 24px;
      background: var(--mist);
      border-radius: var(--radius);
      border: 1px dashed var(--border);
      margin-bottom: 40px;
    }
    .empty-state p {
      color: var(--slate);
      font-size: 0.95rem;
      margin-top: 8px;
    }
    .empty-icon { font-size: 2rem; margin-bottom: 8px; }

    /* ── Loading ── */
    .loading-state {
      text-align: center;
      padding: 32px;
      color: var(--slate);
      font-size: 0.9rem;
    }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error state ── */
    .error-state {
      background: #FEF2F2;
      border: 1px solid #FECACA;
      border-radius: var(--radius);
      padding: 16px 20px;
      color: var(--error);
      font-size: 0.88rem;
      margin-bottom: 32px;
    }

    /* ── Submit form ── */
    .form-section {
      background: var(--mist);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px 28px 24px;
    }
    .form-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--navy);
      margin-bottom: 6px;
    }
    .form-subtitle {
      font-size: 0.83rem;
      color: var(--slate);
      margin-bottom: 22px;
    }

    .form-row { display: flex; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; flex: 1; }
    .form-group label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--navy);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .form-group input,
    .form-group textarea {
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      color: var(--navy);
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      resize: none;
    }
    .form-group input:focus,
    .form-group textarea:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.15);
    }
    .form-group input.error,
    .form-group textarea.error { border-color: var(--error); }
    .field-error { font-size: 0.75rem; color: var(--error); margin-top: 2px; }
    .email-note { font-size: 0.72rem; color: var(--slate); margin-top: 2px; font-style: italic; }

    .submit-btn {
      width: 100%;
      padding: 13px;
      background: var(--navy);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.2s, transform 0.1s;
      margin-top: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .submit-btn:hover:not(:disabled) { background: var(--gold); }
    .submit-btn:active:not(:disabled) { transform: scale(0.99); }
    .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

    /* ── Success message ── */
    .success-msg {
      display: none;
      background: #F0FDF4;
      border: 1px solid #BBF7D0;
      border-radius: var(--radius);
      padding: 18px 22px;
      color: var(--success);
      font-size: 0.9rem;
      font-weight: 500;
      text-align: center;
      margin-top: 12px;
    }
    .success-msg.visible { display: block; }

    /* ── Gold accent rule ── */
    .gold-rule {
      height: 3px;
      background: linear-gradient(90deg, var(--gold), var(--gold-light), transparent);
      border-radius: 2px;
      margin-bottom: 28px;
    }

    @media (max-width: 560px) {
      .form-row { flex-direction: column; gap: 0; }
      .form-section { padding: 20px 16px; }
      .section-header h2 { font-size: 1.4rem; }
    }
  </style>
</head>
<body>

<div class="comments-wrapper">

  <div class="gold-rule"></div>

  <div class="section-header">
    <h2>Reader Comments</h2>
    <span class="comment-count-badge" id="countBadge">...</span>
  </div>

  <!-- Comments display -->
  <div id="commentsArea">
    <div class="loading-state">
      <div class="spinner"></div>
      Fetching comments…
    </div>
  </div>

  <!-- Submit form -->
  <div class="form-section">
    <div class="form-title">Leave a Comment</div>
    <div class="form-subtitle">We'd love to hear your thoughts — your email will not be published.</div>

    <div class="form-row">
      <div class="form-group">
        <label for="fname">Full Name *</label>
        <input type="text" id="fname" placeholder="Jane Smith" />
        <span class="field-error" id="fnameErr"></span>
      </div>
      <div class="form-group">
        <label for="femail">Email Address *</label>
        <input type="email" id="femail" placeholder="jane@email.com" />
        <span class="field-error" id="femailErr"></span>
        <span class="email-note">Not published</span>
      </div>
    </div>

    <div class="form-group">
      <label for="fcomment">Your Comment *</label>
      <textarea id="fcomment" rows="5" placeholder="Share your thoughts on this post…"></textarea>
      <span class="field-error" id="fcommentErr"></span>
    </div>

    <button class="submit-btn" id="submitBtn" onclick="submitComment()">
      Post Comment
    </button>

    <div class="success-msg" id="successMsg">
      ✓ Thank you for your comment! We appreciate your feedback and will respond shortly.
    </div>
  </div>

</div>

<script>
  // ── Config ──────────────────────────────────────────────
  const FORM_ID  = '261665333199061';
  const API_KEY  = 'e97eeee6c6ba657ce4496e610276b94e';
  const API_BASE = 'https://api.jotform.com';

  // ── Field mapping (Jotform question IDs — auto-detected below) ──
  let FIELD_NAME    = null;
  let FIELD_EMAIL   = null;
  let FIELD_COMMENT = null;

  // ── Fetch form questions to map field IDs ────────────────
  async function getFieldIds() {
    try {
      const res = await fetch(`${API_BASE}/form/${FORM_ID}/questions?apiKey=${API_KEY}`);
      const data = await res.json();
      if (data.responseCode !== 200) return;
      const qs = data.content;
      for (const id in qs) {
        const q = qs[id];
        const t = (q.text || q.name || '').toLowerCase();
        const type = (q.type || '').toLowerCase();
        if (type === 'control_fullname' || t.includes('name'))    FIELD_NAME    = id;
        if (type === 'control_email'    || t.includes('email'))   FIELD_EMAIL   = id;
        if (type === 'control_textarea' || t.includes('comment')) FIELD_COMMENT = id;
      }
    } catch(e) { /* silent */ }
  }

  // ── Fetch & render comments ──────────────────────────────
  async function loadComments() {
    const area = document.getElementById('commentsArea');
    try {
      const res  = await fetch(`${API_BASE}/form/${FORM_ID}/submissions?apiKey=${API_KEY}&limit=100&orderby=created_at&direction=DESC`);
      const data = await res.json();

      if (data.responseCode !== 200) throw new Error('API error');

      const subs = (data.content || []).filter(s => s.status === 'ACTIVE');
      document.getElementById('countBadge').textContent =
        subs.length === 1 ? '1 comment' : `${subs.length} comments`;

      if (subs.length === 0) {
        area.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">💬</div>
            <strong>No comments yet</strong>
            <p>Be the first to share your thoughts below.</p>
          </div>`;
        return;
      }

      const cards = subs.map(s => {
        // Pull name & comment from answers regardless of field ID
        let name = 'Anonymous', comment = '', date = '';
        const answers = s.answers || {};
        for (const key in answers) {
          const a = answers[key];
          const label = (a.text || a.name || '').toLowerCase();
          const val   = typeof a.answer === 'object'
            ? Object.values(a.answer).filter(Boolean).join(' ')
            : (a.answer || '');
          if (label.includes('name') && val)    name    = val;
          if (label.includes('comment') && val) comment = val;
        }
        if (s.created_at) {
          const d = new Date(s.created_at.replace(' ', 'T'));
          date = d.toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
        }
        if (!comment) return '';
        const initial = name.trim().charAt(0).toUpperCase();
        return `
          <div class="comment-card">
            <div class="comment-meta">
              <div class="avatar">${initial}</div>
              <div>
                <div class="commenter-name">${escHtml(name)}</div>
                <div class="comment-date">${date}</div>
              </div>
            </div>
            <div class="comment-body">${escHtml(comment)}</div>
          </div>`;
      }).filter(Boolean).join('');

      area.innerHTML = `<div class="comments-list">${cards}</div>`;

    } catch(e) {
      area.innerHTML = `
        <div class="error-state">
          Unable to load comments right now. Please refresh the page to try again.
        </div>`;
      document.getElementById('countBadge').textContent = '—';
    }
  }

  // ── Submit new comment ───────────────────────────────────
  async function submitComment() {
    const nameEl    = document.getElementById('fname');
    const emailEl   = document.getElementById('femail');
    const commentEl = document.getElementById('fcomment');
    const btn       = document.getElementById('submitBtn');
    const successEl = document.getElementById('successMsg');

    // Clear previous errors
    ['fname','femail','fcomment'].forEach(id => {
      document.getElementById(id).classList.remove('error');
    });
    ['fnameErr','femailErr','fcommentErr'].forEach(id => {
      document.getElementById(id).textContent = '';
    });
    successEl.classList.remove('visible');

    // Validate
    let valid = true;
    if (!nameEl.value.trim()) {
      nameEl.classList.add('error');
      document.getElementById('fnameErr').textContent = 'Please enter your name.';
      valid = false;
    }
    if (!emailEl.value.trim() || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailEl.value)) {
      emailEl.classList.add('error');
      document.getElementById('femailErr').textContent = 'Please enter a valid email.';
      valid = false;
    }
    if (!commentEl.value.trim()) {
      commentEl.classList.add('error');
      document.getElementById('fcommentErr').textContent = 'Please write a comment.';
      valid = false;
    }
    if (!valid) return;

    btn.disabled = true;
    btn.textContent = 'Posting…';

    try {
      // Build submission payload using detected field IDs
      const payload = new URLSearchParams();

      if (FIELD_NAME && FIELD_EMAIL && FIELD_COMMENT) {
        // Use mapped field IDs
        const nameType = 'full';
        payload.append(`submission[${FIELD_NAME}][first]`, nameEl.value.trim().split(' ')[0]);
        payload.append(`submission[${FIELD_NAME}][last]`,  nameEl.value.trim().split(' ').slice(1).join(' ') || '');
        payload.append(`submission[${FIELD_EMAIL}]`,       emailEl.value.trim());
        payload.append(`submission[${FIELD_COMMENT}]`,     commentEl.value.trim());
      } else {
        // Fallback: send as raw answers
        payload.append('submission[1]', nameEl.value.trim());
        payload.append('submission[2]', emailEl.value.trim());
        payload.append('submission[3]', commentEl.value.trim());
      }

      const res  = await fetch(`${API_BASE}/form/${FORM_ID}/submissions?apiKey=${API_KEY}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: payload.toString()
      });
      const data = await res.json();

      if (data.responseCode === 200 || data.responseCode === 201) {
        successEl.classList.add('visible');
        nameEl.value = ''; emailEl.value = ''; commentEl.value = '';
        setTimeout(loadComments, 1500); // refresh list
      } else {
        throw new Error('Submit failed');
      }
    } catch(e) {
      document.getElementById('fcommentErr').textContent =
        'Something went wrong. Please try again.';
      commentEl.classList.add('error');
    }

    btn.disabled = false;
    btn.textContent = 'Post Comment';
  }

  // ── Utility ──────────────────────────────────────────────
  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
              .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
  }

  // ── Init ─────────────────────────────────────────────────
  (async () => {
    await getFieldIds();
    await loadComments();
  })();
</script>
</body>
</html>
