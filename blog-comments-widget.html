<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blog Comments</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=Inter:wght@300;400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:       #C9A84C;
      --gold-light: #E8D5A3;
      --navy:       #1A2A3A;
      --slate:      #4A5568;
      --mist:       #F7F8FA;
      --white:      #FFFFFF;
      --border:     #E2E8F0;
      --radius:     10px;
      --shadow:     0 2px 12px rgba(26,42,58,0.08);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #ffffff;
      color: var(--navy);
      padding: 24px 16px 48px;
    }

    .comments-wrapper { max-width: 780px; margin: 0 auto; }

    /* ── Gold rule ── */
    .gold-rule {
      height: 3px;
      background: linear-gradient(90deg, var(--gold), var(--gold-light), transparent);
      border-radius: 2px;
      margin-bottom: 28px;
    }

    /* ── Section header ── */
    .section-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
      padding-bottom: 16px;
      border-bottom: 2px solid var(--gold);
    }
    .section-header h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.75rem;
      font-weight: 600;
      color: var(--navy);
    }
    .comment-count-badge {
      background: var(--gold);
      color: var(--white);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 0.04em;
    }

    /* ── Comment cards ── */
    .comments-list { display: flex; flex-direction: column; gap: 16px; margin-bottom: 40px; }

    .comment-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 22px;
      box-shadow: var(--shadow);
      transition: border-color 0.2s;
    }
    .comment-card:hover { border-color: var(--gold-light); }

    .comment-meta { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .avatar {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--navy);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 1rem; font-weight: 600;
      color: var(--gold);
      flex-shrink: 0;
    }
    .commenter-name { font-weight: 600; font-size: 0.9rem; color: var(--navy); }
    .comment-date  { font-size: 0.75rem; color: var(--slate); margin-top: 2px; }
    .comment-body  { font-size: 0.93rem; line-height: 1.75; color: var(--slate); }

    /* ── States ── */
    .loading-state { text-align: center; padding: 32px; color: var(--slate); font-size: 0.9rem; }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .empty-state {
      text-align: center;
      padding: 36px 24px;
      background: var(--mist);
      border-radius: var(--radius);
      border: 1px dashed var(--border);
      margin-bottom: 36px;
      color: var(--slate);
      font-size: 0.93rem;
    }
    .empty-icon { font-size: 2rem; margin-bottom: 8px; }

    /* ── Form section ── */
    .form-section {
      background: var(--mist);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px 24px 8px;
    }
    .form-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--navy);
      margin-bottom: 4px;
    }
    .form-subtitle {
      font-size: 0.82rem;
      color: var(--slate);
      margin-bottom: 16px;
    }

    /* Jotform iFrame */
    .jotform-frame {
      width: 100%;
      border: none;
      border-radius: 8px;
      min-height: 420px;
      display: block;
    }

    /* ── Refresh button ── */
    .refresh-bar {
      text-align: center;
      margin-bottom: 24px;
    }
    .refresh-btn {
      background: none;
      border: 1px solid var(--gold);
      color: var(--gold);
      font-family: 'Inter', sans-serif;
      font-size: 0.8rem;
      font-weight: 600;
      padding: 6px 16px;
      border-radius: 20px;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.2s, color 0.2s;
    }
    .refresh-btn:hover { background: var(--gold); color: var(--white); }

    @media (max-width: 560px) {
      .section-header h2 { font-size: 1.4rem; }
      .form-section { padding: 18px 14px 6px; }
    }
  </style>
</head>
<body>

<div class="comments-wrapper">

  <div class="gold-rule"></div>

  <div class="section-header">
    <h2>Reader Comments</h2>
    <span class="comment-count-badge" id="countBadge">Loading…</span>
  </div>

  <!-- Comments display -->
  <div id="commentsArea">
    <div class="loading-state">
      <div class="spinner"></div>
      Fetching comments…
    </div>
  </div>

  <div class="refresh-bar">
    <button class="refresh-btn" onclick="loadComments()">↻ Refresh Comments</button>
  </div>

  <!-- Submit form via native Jotform iFrame (bypasses CORS entirely) -->
  <div class="form-section">
    <div class="form-title">Leave a Comment</div>
    <div class="form-subtitle">We'd love to hear your thoughts — your email will not be published.</div>
    <iframe
      class="jotform-frame"
      id="jotformFrame"
      src="https://form.jotform.com/261665333199061"
      title="Leave a Comment"
      allowtransparency="true"
      allow="geolocation; microphone; camera"
      scrolling="no"
      onload="resizeFrame(this)">
    </iframe>
  </div>

</div>

<script>
  const FORM_ID  = '261665333199061';
  const API_KEY  = 'e97eeee6c6ba657ce4496e610276b94e';
  const API_BASE = 'https://api.jotform.com';

  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
      .replace(/'/g,'&#039;');
  }

  function resizeFrame(frame) {
    try { frame.style.height = frame.contentWindow.document.body.scrollHeight + 'px'; } catch(e) {}
  }

  // Listen for Jotform's postMessage after submission to auto-refresh comments
  window.addEventListener('message', function(e) {
    if (e.data && typeof e.data === 'string' && e.data.indexOf('JotForm') !== -1) {
      setTimeout(loadComments, 2000);
    }
    // Jotform height resize messages
    if (e.data && e.data.action === 'setHeight') {
      const frame = document.getElementById('jotformFrame');
      if (frame && e.data.value) frame.style.height = e.data.value + 'px';
    }
  });

  async function loadComments() {
    const area = document.getElementById('commentsArea');
    area.innerHTML = '<div class="loading-state"><div class="spinner"></div>Fetching comments…</div>';

    try {
      const res  = await fetch(`${API_BASE}/form/${FORM_ID}/submissions?apiKey=${API_KEY}&limit=100&orderby=created_at&direction=DESC`);
      const data = await res.json();

      if (data.responseCode !== 200) throw new Error('API error');

      const subs = (data.content || []).filter(s => s.status === 'ACTIVE');

      document.getElementById('countBadge').textContent =
        subs.length === 0 ? '0 comments' :
        subs.length === 1 ? '1 comment'  : `${subs.length} comments`;

      if (subs.length === 0) {
        area.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">💬</div>
            <strong>No comments yet</strong>
            <p style="margin-top:6px">Be the first to share your thoughts below.</p>
          </div>`;
        return;
      }

      const cards = subs.map(s => {
        let name = 'Anonymous', comment = '', date = '';
        const answers = s.answers || {};

        for (const key in answers) {
          const a     = answers[key];
          const label = (a.text || a.name || '').toLowerCase();
          let val     = '';

          if (typeof a.answer === 'object' && a.answer !== null) {
            val = Object.values(a.answer).filter(Boolean).join(' ').trim();
          } else {
            val = (a.answer || '').toString().trim();
          }

          if (!val) continue;
          if (label.includes('name'))    name    = val;
          if (label.includes('comment') || label.includes('thought') || label.includes('message')) comment = val;
        }

        // Fallback: grab longest answer as comment
        if (!comment) {
          let longest = '';
          for (const key in answers) {
            const a   = answers[key];
            const val = typeof a.answer === 'object'
              ? Object.values(a.answer || {}).filter(Boolean).join(' ')
              : (a.answer || '').toString();
            if (val.length > longest.length) longest = val;
          }
          comment = longest;
        }

        if (!comment || comment === name) return '';

        if (s.created_at) {
          const d = new Date(s.created_at.replace(' ', 'T'));
          date = d.toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' });
        }

        const initial = name.trim().charAt(0).toUpperCase() || '?';
        return `
          <div class="comment-card">
            <div class="comment-meta">
              <div class="avatar">${initial}</div>
              <div>
                <div class="commenter-name">${escHtml(name)}</div>
                <div class="comment-date">${date}</div>
              </div>
            </div>
            <div class="comment-body">${escHtml(comment)}</div>
          </div>`;
      }).filter(Boolean).join('');

      area.innerHTML = cards
        ? `<div class="comments-list">${cards}</div>`
        : `<div class="empty-state"><div class="empty-icon">💬</div><strong>No comments yet</strong><p style="margin-top:6px">Be the first to share your thoughts below.</p></div>`;

    } catch(err) {
      area.innerHTML = `
        <div class="empty-state" style="border-color:#FECACA;background:#FEF2F2;color:#B91C1C;">
          Unable to load comments right now. <button class="refresh-btn" onclick="loadComments()" style="margin-top:10px;display:block;margin-left:auto;margin-right:auto;">Try Again</button>
        </div>`;
      document.getElementById('countBadge').textContent = '—';
    }
  }

  loadComments();
</script>
</body>
</html>
